<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Demo - MashaAI Connect</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* GENERAL */
body {
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
    margin: 0;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 6px;
}
.logo img {
    height: 42px;
    filter: drop-shadow(0 0 8px rgba(56,189,248,0.6));
}
.logo-text {
    color: #22d3ee;
    font-weight: bold;
}

/* NAVBAR */
.navbar {
    padding: 15px 0;
    background: #020617;
}
.container {
    width: 90%;
    margin: auto;
}
.nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
}
.nav-links a {
    color: white;
    text-decoration: none;
}
.cta-button {
    background: #22d3ee;
    padding: 6px 12px;
    border-radius: 6px;
}

/* FORM */
.demo-section {
    padding: 60px 0;
}

.demo-form-container {
    max-width: 600px;
    margin: auto;
    background: #0f172a;
    padding: 30px;
    border-radius: 12px;
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid #1e293b;
    background: #020617;
    color: white;
}

input:focus,
select:focus,
textarea:focus {
    outline: none;
    border-color: #22d3ee;
    box-shadow: 0 0 8px rgba(34,211,238,0.5);
}

/* PRODUCT CARDS */
.product-options {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.product-card {
    flex: 1;
    cursor: pointer;
}

.product-card input {
    display: none;
}

.card-content {
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #1e293b;
    background: #020617;
    text-align: center;
    transition: 0.3s;
}

.card-content i {
    font-size: 22px;
    color: #22d3ee;
}

.product-card:hover .card-content {
    transform: translateY(-4px);
    border-color: #22d3ee;
}

.product-card input:checked + .card-content {
    border: 2px solid #22d3ee;
    box-shadow: 0 0 15px rgba(34,211,238,0.4);
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #22d3ee, #3b82f6);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
}

/* SUCCESS */
#successMessage {
    display: none;
    text-align: center;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="container">
    <div class="logo">
        <img src="logo.png">
        <span class="logo-text">MashaAI Connect</span>
    </div>
</div>
</nav>

<!-- FORM -->
<section class="demo-section">
<div class="container">

<div class="demo-form-container">

<h1>Book Your Demo</h1>

<form id="demoForm" action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="3aa93d8f-dec2-4a6a-9e8f-c4b84841298f">

<label>Full Name *</label>
<input type="text" name="fullName" required>

<label>Email *</label>
<input type="email" name="email" required>

<label>Company *</label>
<input type="text" name="company" required>

<label>Industry *</label>
<select name="industry" required>
<option value="">Select</option>
<option>Healthcare</option>
<option>E-Commerce</option>
<option>FinTech</option>
<option>Education</option>
</select>

<!-- PRODUCT SELECT -->
<label>Select Product *</label>
<div class="product-options">

<label class="product-card">
<input type="radio" name="product" value="AI Calling Agents" required>
<div class="card-content">
<i class="fas fa-phone-alt"></i>
<h4>AI Calling Agents</h4>
<p>Automate customer calls</p>
</div>
</label>

<label class="product-card">
<input type="radio" name="product" value="AI Appointment Setter" required>
<div class="card-content">
<i class="fas fa-calendar-check"></i>
<h4>AI Appointment Setter</h4>
<p>Automate bookings & outreach</p>
</div>
</label>

</div>

<label>
<input type="checkbox" name="terms" required>
I agree to terms *
</label>

<button type="submit" class="btn-primary">
Schedule Demo
</button>

</form>

<!-- SUCCESS -->
<div id="successMessage">
<h2>✅ Demo Booked!</h2>
<p>We’ll contact you soon.</p>
</div>

</div>
</div>
</section>

<script>
const form = document.getElementById("demoForm");
const success = document.getElementById("successMessage");

form.addEventListener("submit", function() {
    setTimeout(() => {
        form.style.display = "none";
        success.style.display = "block";
    }, 1000);
});
</script>

</body>
</html>
