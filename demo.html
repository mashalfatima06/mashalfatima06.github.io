<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Demo - MashaAI Connect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        /* ✅ Logo (same as index) */
        .logo {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logo img {
            height: 42px;
            filter: drop-shadow(0 0 8px rgba(56,189,248,0.6));
        }

        .logo-text {
            font-weight: 700;
            font-size: 18px;
            color: #22d3ee;
        }

        /* ✅ FIX: allow clicks through background */
        .stars,
        .animated-bg,
        .floating-elements,
        .float-box,
        .pulse-circle {
            pointer-events: none;
        }

        /* ✅ Ensure form is clickable */
        .demo-wrapper {
            position: relative;
            z-index: 2;
        }

        .demo-form-container {
            position: relative;
            z-index: 5;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="MashaAI Logo">
            <span class="logo-text">MashaAI Connect</span>
        </div>

        <button class="menu-toggle" type="button">
            <span class="menu-bar"></span>
            <span class="menu-bar"></span>
            <span class="menu-bar"></span>
        </button>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="calling-agents.html">AI Calling Agents</a></li>
            <li><a href="pricing.html">AI Appointment Setter</a></li>
            <li><a href="calculator.html">Pricing</a></li>
            <li><a href="demo.html" class="active cta-button">Book Demo</a></li>
        </ul>
    </div>
</nav>

<!-- DEMO SECTION -->
<section class="demo-section">
    <div class="stars"></div>

    <div class="container">
        <div class="demo-wrapper">

            <!-- FORM -->
            <div class="demo-form-container">
                <h1>Book Your Demo</h1>

                <form action="https://api.web3forms.com/submit" method="POST">
                    
                    <input type="hidden" name="access_key" value="3aa93d8f-dec2-4a6a-9e8f-c4b84841298f">

                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" name="fullName" required>
                    </div>

                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Company *</label>
                        <input type="text" name="company" required>
                    </div>

                    <div class="form-group">
                        <label>Industry *</label>
                        <select name="industry" required>
                            <option value="">Select</option>
                            <option>Healthcare</option>
                            <option>E-Commerce</option>
                            <option>FinTech</option>
                            <option>Education</option>
                        </select>
                    </div>

                    <!-- ✅ FIXED CHECKBOXES -->
                    <div class="form-group">
                        <label>Interests *</label>
                        <label><input type="checkbox" name="interests[]" value="AI Calling"> AI Calling</label>
                        <label><input type="checkbox" name="interests[]" value="WhatsApp"> WhatsApp</label>
                        <label><input type="checkbox" name="interests[]" value="Email"> Email</label>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" name="terms" required>
                            I agree to terms *
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Schedule Demo
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <p>&copy; 2026 MashaAI Connect. All rights reserved.</p>
        <p>Powered by Advanced AI Technology</p>
    </div>
</footer>

</body>
</html>
